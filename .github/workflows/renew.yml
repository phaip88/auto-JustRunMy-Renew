name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'
jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write
    env:
      # ========== Secrets 配置 ==========
      JUSTRUNMY_EMAIL: ${{ secrets.JUSTRUNMY_EMAIL }}
      JUSTRUNMY_PASSWORD: ${{ secrets.JUSTRUNMY_PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
      SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4
      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 📡 安装 Hysteria2（如果需要代理）
        run: |
          if [ -n "${{ env.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver
          
      - name: 🚀 运行续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ env.JUSTRUNMY_EMAIL }}
          JUSTRUNMY_PASSWORD: ${{ env.JUSTRUNMY_PASSWORD }}
          TG_BOT_TOKEN: ${{ env.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ env.TG_CHAT_ID }}
          HY2_PROXY_URL: ${{ env.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ env.SOCKS_PORT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py
            
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
          
      - name: 🧹 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
